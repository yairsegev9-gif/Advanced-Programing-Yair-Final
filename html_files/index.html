<!DOCTYPE html>
<html lang="en">
<head>

  <title>Advanced Programming Graph</title>

    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
    .layout { display: grid; grid-template-columns: 260px 1fr 320px; height: 100%; }
    iframe { width: 100%; height: 100%; border: 0; border-left: 1px solid #d7dee8; }

<body>
  <div class="layout">
    <iframe src="/app/form.html" name="forms" title="Forms"></iframe>
    <iframe src="/app/temp.html" name="graph" title="Graph"></iframe>
    <iframe src="/app/temp.html" name="values" title="Topic values"></iframe>
  </div>
</body>
</html>
